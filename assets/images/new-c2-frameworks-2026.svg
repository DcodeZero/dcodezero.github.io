<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <!-- Dark cyberpunk background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#071a1a;stop-opacity:1" />
    </linearGradient>
    <!-- Cyan glow filter for title -->
    <filter id="cyanGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for accent elements -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Strong glow for decorative lines -->
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines horizontal -->
  <g stroke="#00ffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>
  <!-- Subtle grid lines vertical -->
  <g stroke="#00ffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="80"  y1="0" x2="80"  y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
  </g>

  <!-- Decorative circuit-like lines (left side) -->
  <g stroke="#00e5ff" stroke-opacity="0.18" stroke-width="1.5" fill="none" filter="url(#lineGlow)">
    <polyline points="30,80 80,80 80,130 130,130"/>
    <polyline points="30,180 60,180 60,220 100,220"/>
    <polyline points="30,300 70,300 70,260 110,260"/>
    <circle cx="80" cy="80" r="3" fill="#00e5ff" fill-opacity="0.5"/>
    <circle cx="60" cy="220" r="3" fill="#00e5ff" fill-opacity="0.5"/>
    <circle cx="70" cy="300" r="3" fill="#00e5ff" fill-opacity="0.5"/>
  </g>

  <!-- Decorative circuit-like lines (right side) -->
  <g stroke="#00e5ff" stroke-opacity="0.18" stroke-width="1.5" fill="none" filter="url(#lineGlow)">
    <polyline points="770,80 720,80 720,130 670,130"/>
    <polyline points="770,180 740,180 740,220 700,220"/>
    <polyline points="770,300 730,300 730,260 690,260"/>
    <circle cx="720" cy="80" r="3" fill="#00e5ff" fill-opacity="0.5"/>
    <circle cx="740" cy="220" r="3" fill="#00e5ff" fill-opacity="0.5"/>
    <circle cx="730" cy="300" r="3" fill="#00e5ff" fill-opacity="0.5"/>
  </g>

  <!-- Central glowing accent orb (background) -->
  <ellipse cx="400" cy="200" rx="220" ry="120" fill="#00e5ff" fill-opacity="0.025" filter="url(#softGlow)"/>

  <!-- Top horizontal accent line -->
  <line x1="150" y1="60" x2="650" y2="60" stroke="#00e5ff" stroke-opacity="0.4" stroke-width="1" filter="url(#lineGlow)"/>
  <!-- Bottom horizontal accent line -->
  <line x1="150" y1="340" x2="650" y2="340" stroke="#00e5ff" stroke-opacity="0.4" stroke-width="1" filter="url(#lineGlow)"/>

  <!-- Corner brackets top-left -->
  <g stroke="#00e5ff" stroke-opacity="0.6" stroke-width="2" fill="none">
    <polyline points="20,15 20,5 30,5"/>
    <polyline points="770,5 780,5 780,15"/>
    <polyline points="20,385 20,395 30,395"/>
    <polyline points="770,395 780,395 780,385"/>
  </g>

  <!-- C2 thematic elements: node graph dots -->
  <g fill="#00e5ff" fill-opacity="0.15">
    <circle cx="160" cy="200" r="5"/>
    <circle cx="210" cy="170" r="4"/>
    <circle cx="210" cy="230" r="4"/>
    <circle cx="590" cy="200" r="5"/>
    <circle cx="540" cy="170" r="4"/>
    <circle cx="540" cy="230" r="4"/>
  </g>
  <g stroke="#00e5ff" stroke-opacity="0.1" stroke-width="1">
    <line x1="160" y1="200" x2="210" y2="170"/>
    <line x1="160" y1="200" x2="210" y2="230"/>
    <line x1="590" y1="200" x2="540" y2="170"/>
    <line x1="590" y1="200" x2="540" y2="230"/>
  </g>

  <!-- Category label -->
  <text
    x="400" y="130"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    font-weight="bold"
    fill="#00e5ff"
    fill-opacity="0.85"
    text-anchor="middle"
    letter-spacing="5"
    filter="url(#cyanGlow)"
  >[ RED-TEAM ]</text>

  <!-- Main title line 1 -->
  <text
    x="400" y="185"
    font-family="'Courier New', Courier, monospace"
    font-size="24"
    font-weight="bold"
    fill="#e0faff"
    text-anchor="middle"
    letter-spacing="1"
    filter="url(#cyanGlow)"
  >The C2 Frameworks of 2026</text>

  <!-- Main title line 2 (highlighted) -->
  <text
    x="400" y="220"
    font-family="'Courier New', Courier, monospace"
    font-size="21"
    font-weight="bold"
    fill="#00e5ff"
    text-anchor="middle"
    letter-spacing="1"
    filter="url(#cyanGlow)"
  >Are Breaking Every Rule</text>

  <!-- Main title line 3 -->
  <text
    x="400" y="252"
    font-family="'Courier New', Courier, monospace"
    font-size="21"
    font-weight="bold"
    fill="#e0faff"
    text-anchor="middle"
    letter-spacing="1"
    filter="url(#cyanGlow)"
  >You Thought You Knew</text>

  <!-- Divider dots -->
  <g fill="#00e5ff" fill-opacity="0.5">
    <circle cx="370" cy="275" r="2"/>
    <circle cx="390" cy="275" r="2"/>
    <circle cx="410" cy="275" r="2"/>
    <circle cx="430" cy="275" r="2"/>
  </g>

  <!-- Tagline -->
  <text
    x="400" y="310"
    font-family="'Courier New', Courier, monospace"
    font-size="12"
    fill="#00e5ff"
    fill-opacity="0.55"
    text-anchor="middle"
    letter-spacing="3"
  >VoidLink · Moonrise · Karsto · Zero Detection</text>

  <!-- Bottom tagline -->
  <text
    x="400" y="360"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    fill="#00e5ff"
    fill-opacity="0.45"
    text-anchor="middle"
    letter-spacing="4"
  >dcodezero.github.io</text>
</svg>
