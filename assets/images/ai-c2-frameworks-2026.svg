<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <!-- Dark cyberpunk background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d1a2e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <!-- Cyan glow filter for title -->
    <filter id="cyanGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for decorative elements -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Pulse glow for accent circles -->
    <filter id="pulseGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Radial highlight in center -->
    <radialGradient id="centerHighlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  <!-- Center radial highlight -->
  <rect width="800" height="400" fill="url(#centerHighlight)"/>

  <!-- Subtle grid overlay -->
  <g stroke="#00d4ff" stroke-opacity="0.03" stroke-width="1">
    <!-- Vertical lines -->
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="550" y1="0" x2="550" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="650" y1="0" x2="650" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
  </g>

  <!-- === THEMATIC VISUAL ELEMENTS: AI-Powered C2 / Hacking === -->

  <!-- Left side: C2 node network graph -->
  <!-- Central node (attacker) -->
  <circle cx="100" cy="200" r="18" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.6" filter="url(#softGlow)"/>
  <circle cx="100" cy="200" r="6" fill="#00d4ff" fill-opacity="0.9" filter="url(#pulseGlow)"/>
  <!-- Beacon lines to agent nodes -->
  <line x1="118" y1="200" x2="165" y2="140" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="118" y1="200" x2="165" y2="200" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="118" y1="200" x2="165" y2="260" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Agent nodes -->
  <circle cx="170" cy="140" r="8" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="170" cy="140" r="3" fill="#00d4ff" fill-opacity="0.7"/>
  <circle cx="170" cy="200" r="8" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="170" cy="200" r="3" fill="#00d4ff" fill-opacity="0.7"/>
  <circle cx="170" cy="260" r="8" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="170" cy="260" r="3" fill="#00d4ff" fill-opacity="0.7"/>
  <!-- Secondary beacon lines -->
  <line x1="178" y1="140" x2="210" y2="110" stroke="#00d4ff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="178" y1="140" x2="210" y2="155" stroke="#00d4ff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3,4"/>
  <circle cx="213" cy="110" r="5" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.35"/>
  <circle cx="213" cy="155" r="5" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.35"/>
  <!-- Label -->
  <text x="60" y="336" font-family="monospace" font-size="9" fill="#00d4ff" fill-opacity="0.4">[C2_SERVER]</text>

  <!-- Right side: EDR flat-line / broken shield -->
  <!-- Shield outline (cracked) -->
  <path d="M680,100 L720,100 L720,160 Q720,190 700,210 Q680,190 680,160 Z" 
        fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.35"/>
  <!-- Crack through shield -->
  <polyline points="700,100 695,135 705,155 698,210" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.6"/>
  <!-- EDR flatline / dead signal -->
  <polyline points="630,270 650,270 660,260 665,280 670,270 690,270 695,245 700,295 705,270 730,270 740,270 760,270" 
            fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.45" stroke-linejoin="round"/>
  <text x="638" y="295" font-family="monospace" font-size="9" fill="#00d4ff" fill-opacity="0.4">[EDR: BYPASSED]</text>

  <!-- Top right: AI brain hex nodes -->
  <polygon points="730,50 745,42 760,50 760,66 745,74 730,66" fill="none" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.4"/>
  <polygon points="755,30 770,22 785,30 785,46 770,54 755,46" fill="none" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.25"/>
  <line x1="760" y1="58" x2="755" y2="46" stroke="#00d4ff" stroke-opacity="0.2" stroke-width="0.8"/>
  <text x="737" y="62" font-family="monospace" font-size="8" fill="#00d4ff" fill-opacity="0.6">AI</text>

  <!-- Decorative top border line -->
  <line x1="0" y1="0" x2="800" y2="0" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Decorative bottom border line -->
  <line x1="0" y1="399" x2="800" y2="399" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Left border accent -->
  <line x1="0" y1="0" x2="0" y2="400" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Right border accent -->
  <line x1="799" y1="0" x2="799" y2="400" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Corner accents -->
  <polyline points="0,0 30,0 30,3" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.8"/>
  <polyline points="800,0 770,0 770,3" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.8"/>
  <polyline points="0,400 30,400 30,397" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.8"/>
  <polyline points="800,400 770,400 770,397" fill="none" stroke="#00d4ff" stroke-width="2" stroke-opacity="0.8"/>

  <!-- === TEXT CONTENT === -->

  <!-- Category label -->
  <text x="400" y="148" 
        font-family="'Courier New', Courier, monospace" 
        font-size="13" 
        fill="#00d4ff" 
        fill-opacity="0.85"
        text-anchor="middle"
        letter-spacing="4"
        filter="url(#softGlow)">[ RED-TEAM ]</text>

  <!-- Decorative separator line -->
  <line x1="290" y1="158" x2="510" y2="158" stroke="#00d4ff" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Main glowing title — line 1 -->
  <text x="400" y="210" 
        font-family="'Courier New', Courier, monospace" 
        font-size="27" 
        font-weight="bold"
        fill="#00d4ff"
        text-anchor="middle"
        filter="url(#cyanGlow)">Your EDR Is Already Dead</text>

  <!-- Main title — line 2 -->
  <text x="400" y="245"
        font-family="'Courier New', Courier, monospace"
        font-size="16"
        font-weight="bold"
        fill="#00d4ff"
        fill-opacity="0.9"
        text-anchor="middle"
        filter="url(#softGlow)">The Rise of AI-Powered C2 Frameworks in 2026</text>

  <!-- Divider -->
  <line x1="250" y1="262" x2="550" y2="262" stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Bottom tagline -->
  <text x="400" y="348" 
        font-family="'Courier New', Courier, monospace" 
        font-size="12" 
        fill="#00d4ff" 
        fill-opacity="0.55"
        text-anchor="middle"
        letter-spacing="2">dcodezero.github.io</text>

  <!-- Decorative dots either side of tagline -->
  <circle cx="270" cy="344" r="2" fill="#00d4ff" fill-opacity="0.4"/>
  <circle cx="530" cy="344" r="2" fill="#00d4ff" fill-opacity="0.4"/>
</svg>
