<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="redGlowFilter">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>

  <!-- Neural Network Nodes - Layer 1 (Input) -->
  <g filter="url(#glow)">
    <circle cx="150" cy="100" r="15" fill="none" stroke="url(#cyanGlow)" stroke-width="2"/>
    <circle cx="150" cy="200" r="15" fill="none" stroke="url(#cyanGlow)" stroke-width="2"/>
    <circle cx="150" cy="300" r="15" fill="none" stroke="url(#cyanGlow)" stroke-width="2"/>
  </g>

  <!-- Neural Network Nodes - Layer 2 (Hidden) -->
  <g filter="url(#glow)">
    <circle cx="300" cy="80" r="15" fill="none" stroke="url(#cyanGlow)" stroke-width="2"/>
    <circle cx="300" cy="160" r="15" fill="none" stroke="url(#cyanGlow)" stroke-width="2"/>
    <circle cx="300" cy="240" r="15" fill="none" stroke="url(#cyanGlow)" stroke-width="2"/>
    <circle cx="300" cy="320" r="15" fill="none" stroke="url(#cyanGlow)" stroke-width="2"/>
  </g>

  <!-- Neural Network Nodes - Layer 3 (Hidden) - COMPROMISED -->
  <g filter="url(#redGlowFilter)">
    <circle cx="450" cy="120" r="18" fill="none" stroke="url(#redGlow)" stroke-width="3"/>
    <circle cx="450" cy="200" r="18" fill="none" stroke="url(#redGlow)" stroke-width="3"/>
    <circle cx="450" cy="280" r="18" fill="none" stroke="url(#redGlow)" stroke-width="3"/>
  </g>

  <!-- Neural Network Nodes - Layer 4 (Output) -->
  <g filter="url(#glow)">
    <circle cx="600" cy="150" r="15" fill="none" stroke="url(#cyanGlow)" stroke-width="2"/>
    <circle cx="600" cy="250" r="15" fill="none" stroke="url(#cyanGlow)" stroke-width="2"/>
  </g>

  <!-- Connections Layer 1 to 2 -->
  <g stroke="#00ffff" stroke-opacity="0.2" stroke-width="1">
    <line x1="165" y1="100" x2="285" y2="80"/>
    <line x1="165" y1="100" x2="285" y2="160"/>
    <line x1="165" y1="100" x2="285" y2="240"/>
    <line x1="165" y1="200" x2="285" y2="80"/>
    <line x1="165" y1="200" x2="285" y2="160"/>
    <line x1="165" y1="200" x2="285" y2="240"/>
    <line x1="165" y1="200" x2="285" y2="320"/>
    <line x1="165" y1="300" x2="285" y2="160"/>
    <line x1="165" y1="300" x2="285" y2="240"/>
    <line x1="165" y1="300" x2="285" y2="320"/>
  </g>

  <!-- Connections Layer 2 to 3 (Attack paths - RED) -->
  <g stroke="#ff0040" stroke-opacity="0.4" stroke-width="2">
    <line x1="315" y1="80" x2="432" y2="120"/>
    <line x1="315" y1="160" x2="432" y2="120"/>
    <line x1="315" y1="160" x2="432" y2="200"/>
    <line x1="315" y1="240" x2="432" y2="200"/>
    <line x1="315" y1="240" x2="432" y2="280"/>
    <line x1="315" y1="320" x2="432" y2="280"/>
  </g>

  <!-- Connections Layer 3 to 4 -->
  <g stroke="#00ffff" stroke-opacity="0.2" stroke-width="1">
    <line x1="468" y1="120" x2="585" y2="150"/>
    <line x1="468" y1="200" x2="585" y2="150"/>
    <line x1="468" y1="200" x2="585" y2="250"/>
    <line x1="468" y1="280" x2="585" y2="250"/>
  </g>

  <!-- Attack Arrow -->
  <g filter="url(#redGlowFilter)">
    <path d="M 680 200 L 720 200 L 710 190 M 720 200 L 710 210" stroke="#ff0040" stroke-width="3" fill="none"/>
    <path d="M 680 200 L 720 200" stroke="#ff0040" stroke-width="3" fill="none" stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" from="10" to="0" dur="0.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Crosshair on middle node -->
  <g filter="url(#redGlowFilter)" stroke="#ff0040" stroke-width="1.5">
    <circle cx="450" cy="200" r="35" fill="none" stroke-dasharray="8,4"/>
    <line x1="450" y1="155" x2="450" y2="175"/>
    <line x1="450" y1="225" x2="450" y2="245"/>
    <line x1="405" y1="200" x2="425" y2="200"/>
    <line x1="475" y1="200" x2="495" y2="200"/>
  </g>

  <!-- Binary rain effect -->
  <g fill="#00ffff" font-family="monospace" font-size="10" opacity="0.15">
    <text x="50" y="30">01001</text>
    <text x="50" y="380">10110</text>
    <text x="720" y="50">11010</text>
    <text x="720" y="370">01101</text>
    <text x="200" y="380">10011</text>
    <text x="550" y="30">00101</text>
  </g>

  <!-- Warning indicators -->
  <g filter="url(#redGlowFilter)">
    <text x="450" y="355" fill="#ff0040" font-family="monospace" font-size="12" text-anchor="middle">ADVERSARIAL ATTACK DETECTED</text>
  </g>

  <!-- Title area accent -->
  <rect x="0" y="0" width="5" height="400" fill="url(#redGlow)"/>
</svg>