<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a14"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#00aaff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="280" x2="800" y2="280"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="720" y1="0" x2="720" y2="400"/>
  </g>

  <!-- PCIe board shape (background element) -->
  <rect x="60" y="100" width="680" height="200" rx="6" fill="none" stroke="#00aaff" stroke-opacity="0.08" stroke-width="1.5"/>

  <!-- NIC chip blocks -->
  <rect x="90" y="130" width="60" height="60" rx="4" fill="#001a33" stroke="#00aaff" stroke-opacity="0.3" stroke-width="1"/>
  <text x="120" y="166" text-anchor="middle" font-family="monospace" font-size="9" fill="#00aaff" fill-opacity="0.5">RTL</text>
  <text x="120" y="178" text-anchor="middle" font-family="monospace" font-size="8" fill="#00aaff" fill-opacity="0.4">8168evl</text>

  <!-- Ethernet port blocks -->
  <rect x="680" y="140" width="40" height="30" rx="2" fill="#001a33" stroke="#00aaff" stroke-opacity="0.4" stroke-width="1"/>
  <rect x="680" y="178" width="40" height="30" rx="2" fill="#001a33" stroke="#00aaff" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Port LEDs -->
  <circle cx="692" cy="155" r="3" fill="#ff4444" filter="url(#glow)" opacity="0.9"/>
  <circle cx="706" cy="155" r="3" fill="#444" opacity="0.5"/>

  <!-- Trace lines on board -->
  <g stroke="#00aaff" stroke-opacity="0.12" stroke-width="1" fill="none">
    <polyline points="150,160 300,160 300,200 450,200"/>
    <polyline points="150,150 280,150 280,220 450,220"/>
    <polyline points="150,170 320,170 320,180 450,180"/>
  </g>

  <!-- Big red X - broken driver indicator -->
  <g filter="url(#glow)" opacity="0.6">
    <line x1="200" y1="195" x2="240" y2="235" stroke="#ff3333" stroke-width="3"/>
    <line x1="240" y1="195" x2="200" y2="235" stroke="#ff3333" stroke-width="3"/>
  </g>

  <!-- Kernel driver label: NONE -->
  <rect x="180" y="250" width="130" height="22" rx="3" fill="#1a0000" stroke="#ff3333" stroke-opacity="0.5" stroke-width="1"/>
  <text x="245" y="265" text-anchor="middle" font-family="monospace" font-size="10" fill="#ff5555">Kernel driver: (none)</text>

  <!-- Arrow pointing to modprobe conf -->
  <line x1="400" y1="215" x2="500" y2="215" stroke="#ff8800" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- modprobe.d box -->
  <rect x="500" y="195" width="200" height="42" rx="4" fill="#1a1000" stroke="#ff8800" stroke-opacity="0.5" stroke-width="1"/>
  <text x="510" y="212" font-family="monospace" font-size="9" fill="#ff8800" opacity="0.8">/etc/modprobe.d/</text>
  <text x="510" y="228" font-family="monospace" font-size="9" fill="#ffaa44">alias pci:...8168... r8168</text>

  <!-- Category label -->
  <text x="400" y="55" text-anchor="middle" font-family="monospace" font-size="12" fill="#00aaff" fill-opacity="0.7" letter-spacing="4">HOMELAB · PROXMOX VE</text>

  <!-- Main title -->
  <text x="400" y="100" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif" font-size="28" font-weight="900" fill="#ffffff" filter="url(#softglow)">The NIC That Wasn't There</text>

  <!-- Subtitle -->
  <text x="400" y="128" text-anchor="middle" font-family="monospace" font-size="11" fill="#aaaacc" fill-opacity="0.7">r8168-dkms · r8169 · vmbr0 · cluster networking</text>

  <!-- Bottom bar -->
  <rect x="0" y="370" width="800" height="30" fill="#00aaff" fill-opacity="0.05"/>
  <text x="400" y="390" text-anchor="middle" font-family="monospace" font-size="11" fill="#00aaff" fill-opacity="0.5">dcodezero.github.io</text>
</svg>
