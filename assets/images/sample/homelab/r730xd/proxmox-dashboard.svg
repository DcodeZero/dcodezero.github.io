<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <!-- Background -->
  <rect width="900" height="500" fill="#1a1a2e"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="40" fill="#2d2d44"/>
  <text x="20" y="26" fill="#e57000" font-family="Arial" font-size="16" font-weight="bold">Proxmox Virtual Environment</text>
  <text x="250" y="26" fill="#888" font-family="monospace" font-size="12">| r730xd.homelab.local</text>

  <!-- Sidebar -->
  <rect x="0" y="40" width="200" height="460" fill="#252538"/>

  <!-- Datacenter tree -->
  <g font-family="monospace" font-size="11">
    <text x="15" y="70" fill="#e57000">▼ Datacenter</text>
    <text x="30" y="95" fill="#aaa">  ▼ r730xd</text>
    <text x="45" y="120" fill="#00ff00">    ● DC01</text>
    <text x="45" y="140" fill="#00ff00">    ● WS01</text>
    <text x="45" y="160" fill="#00ff00">    ● DVWA</text>
    <text x="45" y="180" fill="#00ff00">    ● Kali-LXC</text>
    <text x="45" y="200" fill="#00ff00">    ● WireGuard</text>
    <text x="45" y="220" fill="#888">    ○ Win10-Template</text>
    <text x="45" y="240" fill="#888">    ○ WinSrv-Template</text>
  </g>

  <!-- Storage tree -->
  <g font-family="monospace" font-size="11">
    <text x="15" y="280" fill="#aaa">▼ Storage</text>
    <text x="30" y="305" fill="#00ff00">  local-ssd (1.8TB)</text>
    <text x="30" y="325" fill="#00ff00">  local-hdd (5.5TB)</text>
    <text x="30" y="345" fill="#00ff00">  iso-store</text>
    <text x="30" y="365" fill="#00ff00">  backup-nfs</text>
  </g>

  <!-- Main content area -->
  <rect x="200" y="40" width="700" height="460" fill="#1e1e30"/>

  <!-- Summary header -->
  <rect x="200" y="40" width="700" height="35" fill="#2a2a40"/>
  <text x="220" y="63" fill="#fff" font-family="Arial" font-size="14" font-weight="bold">Summary - r730xd</text>
  <text x="700" y="63" fill="#00ff00" font-family="monospace" font-size="12">● Online</text>

  <!-- Info cards -->
  <!-- CPU Card -->
  <rect x="220" y="90" width="200" height="100" rx="5" fill="#252540" stroke="#333"/>
  <text x="235" y="115" fill="#888" font-family="Arial" font-size="11">CPU Usage</text>
  <text x="235" y="150" fill="#fff" font-family="Arial" font-size="28" font-weight="bold">23%</text>
  <text x="235" y="175" fill="#666" font-family="monospace" font-size="10">Intel Xeon E5-2680 v4</text>
  <!-- CPU bar -->
  <rect x="235" y="130" width="170" height="8" fill="#333" rx="2"/>
  <rect x="235" y="130" width="40" height="8" fill="#00cc66" rx="2"/>

  <!-- RAM Card -->
  <rect x="440" y="90" width="200" height="100" rx="5" fill="#252540" stroke="#333"/>
  <text x="455" y="115" fill="#888" font-family="Arial" font-size="11">Memory Usage</text>
  <text x="455" y="150" fill="#fff" font-family="Arial" font-size="28" font-weight="bold">67.2 GB</text>
  <text x="455" y="175" fill="#666" font-family="monospace" font-size="10">of 128 GB (52%)</text>
  <!-- RAM bar -->
  <rect x="455" y="130" width="170" height="8" fill="#333" rx="2"/>
  <rect x="455" y="130" width="90" height="8" fill="#0088ff" rx="2"/>

  <!-- Storage Card -->
  <rect x="660" y="90" width="220" height="100" rx="5" fill="#252540" stroke="#333"/>
  <text x="675" y="115" fill="#888" font-family="Arial" font-size="11">Storage Usage</text>
  <text x="675" y="150" fill="#fff" font-family="Arial" font-size="28" font-weight="bold">3.2 TB</text>
  <text x="675" y="175" fill="#666" font-family="monospace" font-size="10">of 7.5 TB (43%)</text>
  <!-- Storage bar -->
  <rect x="675" y="130" width="190" height="8" fill="#333" rx="2"/>
  <rect x="675" y="130" width="82" height="8" fill="#ff8800" rx="2"/>

  <!-- VM List -->
  <rect x="220" y="210" width="660" height="30" fill="#2a2a40"/>
  <text x="235" y="230" fill="#fff" font-family="Arial" font-size="12" font-weight="bold">Virtual Machines</text>

  <!-- VM Table Header -->
  <g font-family="monospace" font-size="10" fill="#888">
    <text x="235" y="260">STATUS</text>
    <text x="310" y="260">VMID</text>
    <text x="370" y="260">NAME</text>
    <text x="520" y="260">CPU</text>
    <text x="590" y="260">MEM</text>
    <text x="680" y="260">DISK</text>
    <text x="770" y="260">UPTIME</text>
  </g>

  <!-- VM Rows -->
  <g font-family="monospace" font-size="11">
    <!-- DC01 -->
    <circle cx="245" cy="285" r="5" fill="#00ff00"/>
    <text x="310" y="290" fill="#aaa">100</text>
    <text x="370" y="290" fill="#fff">DC01-YOURDOM</text>
    <text x="520" y="290" fill="#aaa">8%</text>
    <text x="590" y="290" fill="#aaa">16GB</text>
    <text x="680" y="290" fill="#aaa">80GB</text>
    <text x="770" y="290" fill="#aaa">5d 12h</text>

    <!-- WS01 -->
    <circle cx="245" cy="315" r="5" fill="#00ff00"/>
    <text x="310" y="320" fill="#aaa">101</text>
    <text x="370" y="320" fill="#fff">WS01-Workstation</text>
    <text x="520" y="320" fill="#aaa">12%</text>
    <text x="590" y="320" fill="#aaa">8GB</text>
    <text x="680" y="320" fill="#aaa">60GB</text>
    <text x="770" y="320" fill="#aaa">5d 12h</text>

    <!-- DVWA -->
    <circle cx="245" cy="345" r="5" fill="#00ff00"/>
    <text x="310" y="350" fill="#aaa">102</text>
    <text x="370" y="350" fill="#fff">DVWA-Target</text>
    <text x="520" y="350" fill="#aaa">2%</text>
    <text x="590" y="350" fill="#aaa">4GB</text>
    <text x="680" y="350" fill="#aaa">20GB</text>
    <text x="770" y="350" fill="#aaa">5d 12h</text>

    <!-- Kali LXC -->
    <circle cx="245" cy="375" r="5" fill="#00ff00"/>
    <text x="310" y="380" fill="#aaa">200</text>
    <text x="370" y="380" fill="#fff">Kali-AttackBox (LXC)</text>
    <text x="520" y="380" fill="#aaa">5%</text>
    <text x="590" y="380" fill="#aaa">8GB</text>
    <text x="680" y="380" fill="#aaa">40GB</text>
    <text x="770" y="380" fill="#aaa">12d 3h</text>

    <!-- WireGuard -->
    <circle cx="245" cy="405" r="5" fill="#00ff00"/>
    <text x="310" y="410" fill="#aaa">201</text>
    <text x="370" y="410" fill="#fff">WireGuard-VPN (LXC)</text>
    <text x="520" y="410" fill="#aaa">1%</text>
    <text x="590" y="410" fill="#aaa">512MB</text>
    <text x="680" y="410" fill="#aaa">2GB</text>
    <text x="770" y="410" fill="#aaa">30d 8h</text>
  </g>

  <!-- Footer stats -->
  <rect x="200" y="450" width="700" height="50" fill="#252540"/>
  <g font-family="monospace" font-size="10" fill="#888">
    <text x="220" y="475">Nodes: 1</text>
    <text x="320" y="475">VMs: 3 running</text>
    <text x="460" y="475">LXC: 2 running</text>
    <text x="600" y="475">CPU: 14 cores</text>
    <text x="720" y="475">RAM: 128GB</text>
  </g>
</svg>