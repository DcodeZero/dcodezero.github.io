<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="driveBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="400" y="35" fill="#888" font-family="monospace" font-size="16" text-anchor="middle">STORAGE CONFIGURATION - MIXED SSD/HDD RAID</text>

  <!-- Drive cage -->
  <rect x="50" y="60" width="700" height="300" rx="5" fill="url(#driveBg)" stroke="#333" stroke-width="2"/>

  <!-- SSD Section -->
  <text x="200" y="90" fill="#00ff00" font-family="monospace" font-size="12" text-anchor="middle">SSDs - VM STORAGE</text>

  <!-- SSD drives -->
  <g transform="translate(70, 100)">
    <rect x="0" y="0" width="80" height="120" rx="3" fill="#222" stroke="#00ff00" stroke-width="2"/>
    <rect x="10" y="10" width="60" height="8" fill="#111"/>
    <text x="40" y="40" fill="#00ff00" font-family="monospace" font-size="9" text-anchor="middle">SSD</text>
    <text x="40" y="55" fill="#00aa00" font-family="monospace" font-size="8" text-anchor="middle">500GB</text>
    <text x="40" y="70" fill="#666" font-family="monospace" font-size="7" text-anchor="middle">SAMSUNG</text>
    <circle cx="15" cy="105" r="4" fill="#00ff00"><animate attributeName="opacity" values="1;0.3;1" dur="0.3s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="105" r="4" fill="#0066ff"/>
  </g>

  <g transform="translate(160, 100)">
    <rect x="0" y="0" width="80" height="120" rx="3" fill="#222" stroke="#00ff00" stroke-width="2"/>
    <rect x="10" y="10" width="60" height="8" fill="#111"/>
    <text x="40" y="40" fill="#00ff00" font-family="monospace" font-size="9" text-anchor="middle">SSD</text>
    <text x="40" y="55" fill="#00aa00" font-family="monospace" font-size="8" text-anchor="middle">500GB</text>
    <text x="40" y="70" fill="#666" font-family="monospace" font-size="7" text-anchor="middle">SAMSUNG</text>
    <circle cx="15" cy="105" r="4" fill="#00ff00"><animate attributeName="opacity" values="1;0.2;1" dur="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="30" cy="105" r="4" fill="#0066ff"/>
  </g>

  <g transform="translate(250, 100)">
    <rect x="0" y="0" width="80" height="120" rx="3" fill="#222" stroke="#00ff00" stroke-width="2"/>
    <rect x="10" y="10" width="60" height="8" fill="#111"/>
    <text x="40" y="40" fill="#00ff00" font-family="monospace" font-size="9" text-anchor="middle">SSD</text>
    <text x="40" y="55" fill="#00aa00" font-family="monospace" font-size="8" text-anchor="middle">1TB</text>
    <text x="40" y="70" fill="#666" font-family="monospace" font-size="7" text-anchor="middle">CRUCIAL</text>
    <circle cx="15" cy="105" r="4" fill="#00ff00"/>
    <circle cx="30" cy="105" r="4" fill="#0066ff"/>
  </g>

  <!-- Divider -->
  <line x1="380" y1="80" x2="380" y2="340" stroke="#444" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- HDD Section -->
  <text x="560" y="90" fill="#ff8800" font-family="monospace" font-size="12" text-anchor="middle">HDDs - BACKUP/ISO</text>

  <!-- HDD drives -->
  <g transform="translate(420, 100)">
    <rect x="0" y="0" width="80" height="120" rx="3" fill="#222" stroke="#ff8800" stroke-width="2"/>
    <rect x="10" y="10" width="60" height="8" fill="#111"/>
    <text x="40" y="40" fill="#ff8800" font-family="monospace" font-size="9" text-anchor="middle">HDD</text>
    <text x="40" y="55" fill="#cc6600" font-family="monospace" font-size="8" text-anchor="middle">2TB</text>
    <text x="40" y="70" fill="#666" font-family="monospace" font-size="7" text-anchor="middle">SEAGATE</text>
    <circle cx="15" cy="105" r="4" fill="#00ff00"/>
    <circle cx="30" cy="105" r="4" fill="#0066ff"/>
  </g>

  <g transform="translate(510, 100)">
    <rect x="0" y="0" width="80" height="120" rx="3" fill="#222" stroke="#ff8800" stroke-width="2"/>
    <rect x="10" y="10" width="60" height="8" fill="#111"/>
    <text x="40" y="40" fill="#ff8800" font-family="monospace" font-size="9" text-anchor="middle">HDD</text>
    <text x="40" y="55" fill="#cc6600" font-family="monospace" font-size="8" text-anchor="middle">2TB</text>
    <text x="40" y="70" fill="#666" font-family="monospace" font-size="7" text-anchor="middle">SEAGATE</text>
    <circle cx="15" cy="105" r="4" fill="#00ff00"/>
    <circle cx="30" cy="105" r="4" fill="#0066ff"/>
  </g>

  <g transform="translate(600, 100)">
    <rect x="0" y="0" width="80" height="120" rx="3" fill="#222" stroke="#ff8800" stroke-width="2"/>
    <rect x="10" y="10" width="60" height="8" fill="#111"/>
    <text x="40" y="40" fill="#ff8800" font-family="monospace" font-size="9" text-anchor="middle">HDD</text>
    <text x="40" y="55" fill="#cc6600" font-family="monospace" font-size="8" text-anchor="middle">4TB</text>
    <text x="40" y="70" fill="#666" font-family="monospace" font-size="7" text-anchor="middle">WD RED</text>
    <circle cx="15" cy="105" r="4" fill="#00ff00"/>
    <circle cx="30" cy="105" r="4" fill="#0066ff"/>
  </g>

  <!-- RAID Info -->
  <rect x="100" y="250" width="200" height="80" rx="5" fill="#111" stroke="#00ff00"/>
  <text x="200" y="275" fill="#00ff00" font-family="monospace" font-size="11" text-anchor="middle">RAID 0 - SSDs</text>
  <text x="200" y="295" fill="#888" font-family="monospace" font-size="10" text-anchor="middle">2TB Usable</text>
  <text x="200" y="315" fill="#666" font-family="monospace" font-size="9" text-anchor="middle">VM Performance</text>

  <rect x="500" y="250" width="200" height="80" rx="5" fill="#111" stroke="#ff8800"/>
  <text x="600" y="275" fill="#ff8800" font-family="monospace" font-size="11" text-anchor="middle">RAID 5 - HDDs</text>
  <text x="600" y="295" fill="#888" font-family="monospace" font-size="10" text-anchor="middle">6TB Usable</text>
  <text x="600" y="315" fill="#666" font-family="monospace" font-size="9" text-anchor="middle">Backup + ISOs</text>

  <!-- PERC Controller badge -->
  <rect x="320" y="265" width="120" height="50" rx="3" fill="#0066ff" opacity="0.2" stroke="#0066ff"/>
  <text x="380" y="285" fill="#0066ff" font-family="monospace" font-size="9" text-anchor="middle">PERC H730</text>
  <text x="380" y="300" fill="#0066ff" font-family="monospace" font-size="8" text-anchor="middle">RAID Controller</text>
</svg>