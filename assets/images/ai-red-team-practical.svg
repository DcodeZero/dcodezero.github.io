<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="termGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redGlow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff8800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffaa00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="termGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad2)"/>

  <!-- Scan lines effect -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="0" y1="2" x2="800" y2="2"/>
    <line x1="0" y1="6" x2="800" y2="6"/>
    <line x1="0" y1="10" x2="800" y2="10"/>
    <line x1="0" y1="14" x2="800" y2="14"/>
    <line x1="0" y1="18" x2="800" y2="18"/>
    <line x1="0" y1="22" x2="800" y2="22"/>
  </g>

  <!-- Terminal Window 1 - Main -->
  <g transform="translate(40, 30)">
    <!-- Terminal frame -->
    <rect x="0" y="0" width="450" height="280" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="450" height="25" rx="8" fill="#1a1a1a"/>
    <rect x="0" y="15" width="450" height="10" fill="#1a1a1a"/>
    <!-- Window buttons -->
    <circle cx="15" cy="12" r="5" fill="#ff5f56"/>
    <circle cx="35" cy="12" r="5" fill="#ffbd2e"/>
    <circle cx="55" cy="12" r="5" fill="#27ca3f"/>
    <!-- Title -->
    <text x="225" y="16" fill="#666" font-family="monospace" font-size="11" text-anchor="middle">ai_redteam_exploit.py</text>

    <!-- Terminal content -->
    <g filter="url(#termGlow)" font-family="monospace" font-size="11">
      <text x="15" y="50" fill="#00ff00">root@redteam</text>
      <text x="105" y="50" fill="#666">:</text>
      <text x="112" y="50" fill="#5555ff">~/attacks</text>
      <text x="170" y="50" fill="#666">$</text>
      <text x="180" y="50" fill="#fff">python3 pgd_attack.py</text>

      <text x="15" y="70" fill="#888">[*] Loading target model...</text>
      <text x="15" y="90" fill="#888">[*] Generating adversarial examples</text>
      <text x="15" y="110" fill="#00ff00">[+] PGD Attack initialized</text>
      <text x="15" y="130" fill="#00ff00">[+] Epsilon: 8/255, Iterations: 40</text>

      <text x="15" y="155" fill="#ff8800">[!] Attack in progress...</text>

      <!-- Progress bar -->
      <rect x="15" y="165" width="200" height="12" fill="none" stroke="#333" stroke-width="1"/>
      <rect x="16" y="166" width="140" height="10" fill="url(#redGlow2)">
        <animate attributeName="width" from="0" to="180" dur="2s" repeatCount="indefinite"/>
      </rect>
      <text x="225" y="175" fill="#ff0040" font-size="10">71%</text>

      <text x="15" y="200" fill="#ff0040">[!] Adversarial found @ iter 23</text>
      <text x="15" y="220" fill="#ff0040">[!] L-inf perturbation: 0.0314</text>
      <text x="15" y="240" fill="#00ff00">[+] Attack success rate: 94.7%</text>

      <text x="15" y="265" fill="#00ff00">root@redteam</text>
      <text x="105" y="265" fill="#666">:</text>
      <text x="112" y="265" fill="#5555ff">~/attacks</text>
      <text x="170" y="265" fill="#666">$</text>
      <rect x="180" y="255" width="8" height="14" fill="#00ff00">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Terminal Window 2 - Side panel -->
  <g transform="translate(510, 30)">
    <!-- Terminal frame -->
    <rect x="0" y="0" width="250" height="160" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="250" height="20" rx="6" fill="#1a1a1a"/>
    <rect x="0" y="12" width="250" height="8" fill="#1a1a1a"/>
    <text x="125" y="14" fill="#666" font-family="monospace" font-size="9" text-anchor="middle">model_metrics.log</text>

    <!-- Content -->
    <g font-family="monospace" font-size="9" filter="url(#termGlow)">
      <text x="10" y="40" fill="#666">Target: ResNet50</text>
      <text x="10" y="55" fill="#666">Clean Acc: 96.2%</text>
      <text x="10" y="70" fill="#ff0040">Robust Acc: 5.3%</text>
      <text x="10" y="90" fill="#ff8800">--- VULNERABLE ---</text>
      <text x="10" y="110" fill="#666">Queries: 1,247</text>
      <text x="10" y="125" fill="#666">Time: 00:03:42</text>
      <text x="10" y="145" fill="#00ff00">Status: EXPLOITED</text>
    </g>
  </g>

  <!-- Terminal Window 3 - LLM Attack -->
  <g transform="translate(510, 200)">
    <!-- Terminal frame -->
    <rect x="0" y="0" width="250" height="170" rx="6" fill="#0d0d0d" stroke="#ff0040" stroke-width="1" stroke-opacity="0.5"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="250" height="20" rx="6" fill="#1a1a1a"/>
    <rect x="0" y="12" width="250" height="8" fill="#1a1a1a"/>
    <text x="125" y="14" fill="#ff0040" font-family="monospace" font-size="9" text-anchor="middle">prompt_injection.py</text>

    <!-- Content -->
    <g font-family="monospace" font-size="8" filter="url(#termGlow)">
      <text x="10" y="38" fill="#888">[*] Testing payload 7/15</text>
      <text x="10" y="52" fill="#ff8800">[!] Injection detected</text>
      <text x="10" y="68" fill="#666">Category: DIRECT_OVERRIDE</text>
      <text x="10" y="82" fill="#666">Severity: CRITICAL</text>
      <text x="10" y="100" fill="#ff0040">"Ignore previous...</text>
      <text x="10" y="114" fill="#ff0040"> instructions"</text>
      <text x="10" y="132" fill="#00ff00">[+] SUCCESS: Guardrail</text>
      <text x="10" y="146" fill="#00ff00">    bypassed</text>
      <text x="10" y="162" fill="#888">[*] Confidence: 0.94</text>
    </g>
  </g>

  <!-- Decorative elements -->
  <!-- Hex pattern -->
  <g fill="none" stroke="#ff0040" stroke-opacity="0.1" stroke-width="1">
    <polygon points="70,340 85,330 100,340 100,360 85,370 70,360"/>
    <polygon points="100,340 115,330 130,340 130,360 115,370 100,360"/>
    <polygon points="85,360 100,350 115,360 115,380 100,390 85,380"/>
  </g>

  <!-- Data flow lines -->
  <g stroke="#00ff00" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4,4">
    <path d="M 490 150 Q 500 150 510 100">
      <animate attributeName="stroke-dashoffset" from="8" to="0" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M 490 200 Q 500 200 510 250">
      <animate attributeName="stroke-dashoffset" from="8" to="0" dur="1s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Status indicators -->
  <g transform="translate(180, 340)">
    <circle cx="0" cy="0" r="4" fill="#00ff00">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="12" y="4" fill="#666" font-family="monospace" font-size="10">ATTACK ACTIVE</text>

    <circle cx="130" cy="0" r="4" fill="#ff0040">
      <animate attributeName="opacity" values="1;0.5;1" dur="0.5s" repeatCount="indefinite"/>
    </circle>
    <text x="142" y="4" fill="#666" font-family="monospace" font-size="10">3 VULNS FOUND</text>

    <circle cx="270" cy="0" r="4" fill="#ff8800"/>
    <text x="282" y="4" fill="#666" font-family="monospace" font-size="10">EXFIL READY</text>
  </g>

  <!-- Corner accents -->
  <path d="M 0 0 L 30 0 L 0 30 Z" fill="#ff0040" opacity="0.3"/>
  <path d="M 800 400 L 770 400 L 800 370 Z" fill="#ff0040" opacity="0.3"/>

  <!-- Title accent bar -->
  <rect x="0" y="395" width="800" height="5" fill="url(#redGlow2)" opacity="0.8"/>
</svg>