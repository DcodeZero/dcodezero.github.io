<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgAI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="redG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0040"/>
      <stop offset="100%" style="stop-color:#ff4444"/>
    </linearGradient>
    <linearGradient id="cyanG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#0088ff"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bgAI)"/>

  <!-- Neural network -->
  <g filter="url(#glow1)">
    <!-- Layer 1 -->
    <circle cx="150" cy="120" r="12" fill="none" stroke="url(#cyanG)" stroke-width="2"/>
    <circle cx="150" cy="200" r="12" fill="none" stroke="url(#cyanG)" stroke-width="2"/>
    <circle cx="150" cy="280" r="12" fill="none" stroke="url(#cyanG)" stroke-width="2"/>
    <!-- Layer 2 -->
    <circle cx="300" cy="100" r="14" fill="none" stroke="url(#redG)" stroke-width="2"/>
    <circle cx="300" cy="200" r="14" fill="none" stroke="url(#redG)" stroke-width="2"/>
    <circle cx="300" cy="300" r="14" fill="none" stroke="url(#redG)" stroke-width="2"/>
    <!-- Layer 3 -->
    <circle cx="450" cy="160" r="12" fill="none" stroke="url(#cyanG)" stroke-width="2"/>
    <circle cx="450" cy="240" r="12" fill="none" stroke="url(#cyanG)" stroke-width="2"/>
  </g>

  <!-- Connections -->
  <g stroke="#00ffff" stroke-opacity="0.3" stroke-width="1">
    <line x1="162" y1="120" x2="286" y2="100"/>
    <line x1="162" y1="120" x2="286" y2="200"/>
    <line x1="162" y1="200" x2="286" y2="100"/>
    <line x1="162" y1="200" x2="286" y2="200"/>
    <line x1="162" y1="200" x2="286" y2="300"/>
    <line x1="162" y1="280" x2="286" y2="200"/>
    <line x1="162" y1="280" x2="286" y2="300"/>
    <line x1="314" y1="100" x2="436" y2="160"/>
    <line x1="314" y1="200" x2="436" y2="160"/>
    <line x1="314" y1="200" x2="436" y2="240"/>
    <line x1="314" y1="300" x2="436" y2="240"/>
  </g>

  <!-- Attack crosshair on center node -->
  <g filter="url(#glow1)" stroke="url(#redG)" stroke-width="2" fill="none">
    <circle cx="300" cy="200" r="30" stroke-dasharray="8,4">
      <animate attributeName="r" values="30;35;30" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="300" y1="160" x2="300" y2="180"/>
    <line x1="300" y1="220" x2="300" y2="240"/>
    <line x1="260" y1="200" x2="280" y2="200"/>
    <line x1="320" y1="200" x2="340" y2="200"/>
  </g>

  <!-- Title -->
  <text x="300" y="360" fill="url(#redG)" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle" filter="url(#glow1)">AI RED TEAMING</text>

  <!-- Accent -->
  <rect x="0" y="390" width="600" height="10" fill="url(#redG)" opacity="0.7"/>
</svg>