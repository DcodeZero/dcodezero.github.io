<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgTools" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8800ff"/>
      <stop offset="100%" style="stop-color:#aa44ff"/>
    </linearGradient>
    <linearGradient id="cyan2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#00aaff"/>
    </linearGradient>
    <filter id="glowT">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bgTools)"/>

  <!-- Terminal window -->
  <g transform="translate(100, 50)">
    <rect x="0" y="0" width="400" height="250" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="2"/>
    <rect x="0" y="0" width="400" height="28" rx="8" fill="#1a1a1a"/>
    <rect x="0" y="20" width="400" height="8" fill="#1a1a1a"/>
    <circle cx="18" cy="14" r="6" fill="#ff5f56"/>
    <circle cx="38" cy="14" r="6" fill="#ffbd2e"/>
    <circle cx="58" cy="14" r="6" fill="#27ca3f"/>
    <text x="200" y="18" fill="#666" font-family="monospace" font-size="11" text-anchor="middle">tools.sh</text>

    <!-- Code content -->
    <g font-family="monospace" font-size="11" filter="url(#glowT)">
      <text x="15" y="55" fill="#ff79c6">#!/bin/bash</text>

      <text x="15" y="80" fill="#6272a4"># Red Team Toolkit</text>

      <text x="15" y="105" fill="#8be9fd">function</text>
      <text x="80" y="105" fill="#50fa7b">recon()</text>
      <text x="140" y="105" fill="#f8f8f2">{</text>

      <text x="30" y="125" fill="#f8f8f2">nmap -sV -sC $1</text>

      <text x="30" y="145" fill="#f8f8f2">gobuster dir -u $1</text>

      <text x="15" y="165" fill="#f8f8f2">}</text>

      <text x="15" y="190" fill="#8be9fd">function</text>
      <text x="80" y="190" fill="#50fa7b">exploit()</text>
      <text x="155" y="190" fill="#f8f8f2">{</text>

      <text x="30" y="210" fill="#f8f8f2">msfconsole -x</text>
      <text x="140" y="210" fill="#f1fa8c">"use $1"</text>

      <text x="15" y="230" fill="#f8f8f2">}</text>
    </g>
  </g>

  <!-- Floating tool icons -->
  <g filter="url(#glowT)">
    <!-- Wrench -->
    <g transform="translate(60, 180)" stroke="url(#purple)" stroke-width="2" fill="none">
      <path d="M 0 0 L 15 15 L 12 18 L -3 3 Z"/>
      <circle cx="18" cy="18" r="8"/>
    </g>

    <!-- Gear -->
    <g transform="translate(530, 120)" stroke="url(#cyan2)" stroke-width="2" fill="none">
      <circle cx="0" cy="0" r="12"/>
      <circle cx="0" cy="0" r="5"/>
      <line x1="0" y1="-18" x2="0" y2="-12"/>
      <line x1="0" y1="12" x2="0" y2="18"/>
      <line x1="-18" y1="0" x2="-12" y2="0"/>
      <line x1="12" y1="0" x2="18" y2="0"/>
    </g>

    <!-- Python logo simplified -->
    <g transform="translate(540, 220)" fill="url(#purple)">
      <text font-family="monospace" font-size="24" font-weight="bold">Py</text>
    </g>
  </g>

  <!-- Binary accent -->
  <g fill="#8800ff" font-family="monospace" font-size="9" opacity="0.3">
    <text x="50" y="380">01011010 11001010 01110011</text>
    <text x="400" y="380">10110101 01001011 11010010</text>
  </g>

  <!-- Title -->
  <text x="300" y="355" fill="url(#purple)" font-family="monospace" font-size="24" font-weight="bold" text-anchor="middle" filter="url(#glowT)">TOOLS &amp; SCRIPTS</text>

  <!-- Accent bar -->
  <rect x="0" y="390" width="600" height="10" fill="url(#purple)" opacity="0.7"/>
</svg>